version: '3.8'

services:
  node-server:
    build: .
    image: section35-app
    container_name: section35-node
    command: npm start
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - PORT=3001
      - NODE_ENV=production

  python-server:
    image: section35-app
    container_name: section35-python
    command: python scripts/live_server.py
    restart: unless-stopped
    depends_on:
      - node-server
    # Model is pre-downloaded, but we don't need volumes for the live server unless it saves data.
    # We share the same image so it has all the dependencies.
    environment:
      - PYTHONUNBUFFERED=1

  nginx:
    image: nginx:alpine
    container_name: section35-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-server
      - python-server
